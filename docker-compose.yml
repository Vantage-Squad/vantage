services:
  memgraph:
    image: memgraph/memgraph-mage:3.8.0
    ports:
      - "7688:7687"
      - "7444:7444"
    command: ["--log-level=TRACE", "--bolt-server-name-for-init=Neo4j/4.4.20"]
    volumes:
      - memgraph-data:/var/lib/memgraph

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vantage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  memgraph-data:
  postgres-data:
