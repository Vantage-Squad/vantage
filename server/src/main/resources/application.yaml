ktor:
  deployment:
    port: ${PORT:-8081}
  application:
    modules:
      - com.vantage.bootstrap.StartupKt.configureStartup
      - com.vantage.bootstrap.HttpKt.configureHttp
      - com.vantage.bootstrap.SerializationKt.configureSerialization
      - com.vantage.bootstrap.StatusPagesKt.configureStatusPages
      - com.vantage.bootstrap.KoogKt.configureKoog
      - com.vantage.bootstrap.RoutingKt.configureRouting

app:
  apiKey: "${VANTAGE_API_KEY:-vantage-dev-key-2026}"
  squad:
    sandboxBaseUrl: "https://sandbox-api-d.squadco.com"
    secretKey: "${SQUAD_SECRET_KEY:-}"
    publicKey: "${SQUAD_PUBLIC_KEY:-}"
  memgraph:
    boltUri: "${NEO4J_BOLT_URI:-${MEMGRAPH_BOLT_URI:-bolt://localhost:7687}}"
    username: "${NEO4J_USERNAME:-${MEMGRAPH_USERNAME:-}}"
    password: "${NEO4J_PASSWORD:-${MEMGRAPH_PASSWORD:-}}"
  trustScore:
    alpha: 0.35
    beta: 0.40
    gamma: 0.25
    tiers:
      green: 0.7
      amber: 0.4
      red: 0.0
  llm:
    provider: "${LLM_PROVIDER:-template}"
    ollama:
      model: "${OLLAMA_MODEL:-llama3.1:8b}"
      baseUrl: "${OLLAMA_BASE_URL:-http://localhost:11434}"
    gemini:
      apiKey: "${GEMINI_API_KEY:-}"
      model: "gemini-2.5-pro"
    groq:
      apiKey: "${GROQ_API_KEY:-}"
      model: "${GROQ_MODEL:-llama-3.3-70b-versatile}"

